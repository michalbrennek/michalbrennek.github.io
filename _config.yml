# Site Settings
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"

title: "I'm about to kernel panic."
subtitle: "Michał Brennek. Vorticity, vacuum tubes, and a 3D printer that hates me."
name: "Michał Brennek"
description: "Michał Brennek's blog on atmospheric physics, HPC, the history of numerical weather prediction, and 3D printing disasters. Researcher at the Institute of Geophysics, Polish Academy of Sciences."
url: "https://michalbrennek.github.io"
baseurl: ""
future: true
locale: "en-US"
logo: "/assets/images/header-fortran.jpg"
search: true

# SEO Related (jekyll-seo-tag)
twitter:
  username: michalbrennek
social:
  type: Person
  name: "Michał Brennek"
  links:
    - "https://linkedin.com/in/michalbrennek"
    - "https://github.com/michalbrennek"
    - "https://bsky.app/profile/michalbrennek"
    - "https://brennek.com"

# Google Search Console / Analytics
google_site_verification: "f0Mfx78bvXQHZP5NQBAnZfrAS8PXQsp6eo1sVuh5Vqg"
# analytics:
#   provider: "google-gtag"
#   google:
#     tracking_id: "G-XXXXXXXXXX"
#     anonymize_ip: false

# Author
author:
  name: "Michał Brennek"
  # avatar: "/assets/images/bio-photo.jpg"  # Add your photo here
  bio: "Meteorologist, oceanographer, Python solvem probler, experimenter, Raspberry Pi tinkerer, geek dad, manager, space enthusiast, ham radio lover, science columnist, ADHDer, synthetic intellect curious, linux admin cosplayer."
  location: "Poland"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/michalbrennek"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/michalbrennek"
    - label: "Bluesky"
      icon: "fab fa-fw fa-bluesky"
      url: "https://bsky.app/profile/michalbrennek"
    - label: "brennek.com"
      icon: "fas fa-fw fa-globe"
      url: "https://brennek.com"

# Reading
words_per_minute: 200

# Build
markdown: kramdown
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme
  - jekyll-seo-tag

# Pagination
paginate: 6
paginate_path: /page:num/

# Outputting
permalink: /:categories/:year/:month/:day/:title:output_ext

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
      related: true
      share: true
      header:
        overlay_color: "#1a1d24"
      classes: wide

  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Include
include:
  - _pages

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - _posts/sources
